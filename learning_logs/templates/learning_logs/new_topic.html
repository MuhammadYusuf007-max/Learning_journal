{% extends 'learning_logs/base.html' %}

{% block content %}
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'learning_logs:topics' %}" class="text-decoration-none">Topics</a></li>
            <li class="breadcrumb-item active" aria-current="page">Add New Topic</li>
        </ol>
    </nav>

    <div class="card shadow-sm border-0 bg-light mt-4">
        <div class="card-body p-4">
            <h3 class="card-title mb-4 fw-bold text-primary">Add a New Topic</h3>
            
            <form action="{% url 'learning_logs:new_topic' %}" method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    {{ form.as_div }}
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4 fw-bold">Add Topic</button>
                    <a href="{% url 'learning_logs:topics' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
